name: WeatherLens daily pipeline

# Free cron for public GitHub repos.
# Mirrors EventBridge `cron(0 6 * * ? *)` — 06:00 UTC every day.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (yesterday UTC)
        run: python -m src.orchestrator.pipeline

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: weatherlens-data-${{ github.run_number }}
          path: |
            data/raw/**
            data/processed/**
            logs/**
          retention-days: 14
